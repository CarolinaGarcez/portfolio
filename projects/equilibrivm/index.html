<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equilibrivm Experience</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS Principal -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>



  <!-- Container Principal -->
  <main class="experience-container">

    <!-- Seção Centralizada -->
    <section class="main-content">

      <!-- Disco de Vinil Giratório -->
      <div class="vinyl-container">
        <div class="vinyl-glow"></div>
        <div class="vinyl-record">
          <div class="vinyl-label">
            <div class="vinyl-hole"></div>
          </div>
        </div>
      </div>

      <!-- Título -->
      <h1 class="hero-title">EQUILIBRIVM</h1>
      <span class="hero-tag">Experience</span>

      <!-- Descrição  -->
      <p class="hero-description">
        Transformando minha ansiedade em projeto.
        <br><br>
        Uma experiência interativa baseada na dualidade emocional do álbum.
      </p>

      <!-- Texto Superior do Contador -->
      <span class="countdown-title">FALTAM</span>

      <!-- Contagem Regressiva Flip -->
      <div class="countdown-container">

        <!-- Grupo: Dias -->
        <div class="countdown-group">
          <div class="digit-pair" id="days-pair">
            <div class="flip-card" id="days-tens">
              <div class="card-face top"><span class="digit-num">0</span></div>
              <div class="card-face bottom"><span class="digit-num">0</span></div>
            </div>
            <div class="flip-card" id="days-ones">
              <div class="card-face top"><span class="digit-num">0</span></div>
              <div class="card-face bottom"><span class="digit-num">0</span></div>
            </div>
          </div>
          <span class="group-label">Dias</span>
        </div>

        <!-- Grupo: Horas -->
        <div class="countdown-group">
          <div class="digit-pair" id="hours-pair">
            <div class="flip-card" id="hours-tens">
              <div class="card-face top"><span class="digit-num">0</span></div>
              <div class="card-face bottom"><span class="digit-num">0</span></div>
            </div>
            <div class="flip-card" id="hours-ones">
              <div class="card-face top"><span class="digit-num">0</span></div>
              <div class="card-face bottom"><span class="digit-num">0</span></div>
            </div>
          </div>
          <span class="group-label">Horas</span>
        </div>

        <!-- Grupo: Minutos -->
        <div class="countdown-group">
          <div class="digit-pair" id="minutes-pair">
            <div class="flip-card" id="minutes-tens">
              <div class="card-face top"><span class="digit-num">0</span></div>
              <div class="card-face bottom"><span class="digit-num">0</span></div>
            </div>
            <div class="flip-card" id="minutes-ones">
              <div class="card-face top"><span class="digit-num">0</span></div>
              <div class="card-face bottom"><span class="digit-num">0</span></div>
            </div>
          </div>
          <span class="group-label">Minutos</span>
        </div>

        <!-- Grupo: Segundos -->
        <div class="countdown-group">
          <div class="digit-pair" id="seconds-pair">
            <div class="flip-card" id="seconds-tens">
              <div class="card-face top"><span class="digit-num">0</span></div>
              <div class="card-face bottom"><span class="digit-num">0</span></div>
            </div>
            <div class="flip-card" id="seconds-ones">
              <div class="card-face top"><span class="digit-num">0</span></div>
              <div class="card-face bottom"><span class="digit-num">0</span></div>
            </div>
          </div>
          <span class="group-label">Segundos</span>
        </div>

      </div>

      <!-- Dia do Show -->
      <span class="event-info">08.08.2026 • SÃO PAULO</span>

    </section>

  </main>

  <!-- footer-->
  <footer class="music-footer">
    <div class="socialIcons">
      <a href="https://www.linkedin.com/in/carolinagarcez" target="_blank" aria-label="LinkedIn">
        <i class="fa-brands fa-linkedin"></i>
      </a>
      <a href="https://github.com/CarolinaGarcez" target="_blank" aria-label="GitHub">
        <i class="fa-brands fa-github"></i>
      </a>
      <a href="https://www.instagram.com/mariacarolina.g.a/" target="_blank" aria-label="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>
      <a href="https://carolinagarcez.github.io/portfolio/" target="_blank" aria-label="Portfólio">
        <i class="fa-solid fa-laptop-code"></i>
      </a>
    </div>

    <div class="footerBottom">
      <img src="img/logo-branco.png" alt="Logo Carolina">
      <p>
        © 2026 - Desenvolvido a base de ansiedade e café por
        <span class="designer">Carolina Garcez</span>
      </p>
    </div>
  </footer>

  <!-- Script Principal Modularizado (Entrypoint) -->
  <script type="module" src="js/main.js"></script>
</body>

</html>
